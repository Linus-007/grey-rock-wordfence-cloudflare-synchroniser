name: Application Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '23 8 * * 3'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wordpress-security:
    name: WordPress security checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Install security-analysis dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run WordPress security checks
        env:
          RUN_SEMGREP: '0'
        run: ./scripts/security-check.sh

  semgrep:
    name: Semgrep CE SAST
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check "semgrep==1.169.0"

      - name: Run Semgrep
        run: semgrep scan --config auto --error src

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out complete Git history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
